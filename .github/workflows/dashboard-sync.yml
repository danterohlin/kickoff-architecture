name: Sync to Techtify Dashboard

on:
  push:
    branches: ["**"]

jobs:
  sync:
    runs-on: ubuntu-latest
    if: ${{ vars.DASHBOARD_API_URL != '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Parse project data and sync
        env:
          DASHBOARD_API_URL: ${{ vars.DASHBOARD_API_URL }}
          DASHBOARD_API_KEY: ${{ secrets.DASHBOARD_API_KEY }}
          REPO_URL: https://github.com/${{ github.repository }}
          COMMIT_HASH: ${{ github.sha }}
        run: |
          set -euo pipefail

          BRANCH="${GITHUB_REF#refs/heads/}"
          COMMIT_MESSAGE=$(git log -1 --format='%s')
          COMMIT_DATE=$(git log -1 --format='%aI')
          SYNCED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          FILES_CHANGED=$(git diff --name-only HEAD~1 2>/dev/null | head -20 || echo "")

          python3 - "$REPO_URL" "$BRANCH" "$COMMIT_HASH" "$COMMIT_MESSAGE" "$COMMIT_DATE" "$SYNCED_AT" "$FILES_CHANGED" <<'PYEOF'
          import json, re, sys, os, urllib.request

          repo_url, branch, commit_hash, commit_msg, commit_date, synced_at, files_raw = sys.argv[1:8]
          files_changed = [f for f in files_raw.strip().split("\n") if f.strip()]

          def read_file(path):
              try:
                  with open(path) as f:
                      return f.read()
              except FileNotFoundError:
                  return None

          def parse_section(content, heading):
              parts = re.split(rf"## {heading}", content, flags=re.IGNORECASE)
              if len(parts) < 2:
                  return None
              section = parts[1]
              next_h = section.find("\n## ")
              block = section[:next_h] if next_h > 0 else section
              return block.strip() or None

          def parse_kv_section(content, heading):
              block = parse_section(content, heading)
              if not block:
                  return None
              result = {}
              for line in block.split("\n"):
                  m = re.match(r"^[-*]\s+(.+?):\s+(.+)", line)
                  if m:
                      result[m.group(1).strip()] = m.group(2).strip()
              return result if result else None

          def parse_plan_phases(content):
              phases = []
              current = None
              for line in content.split("\n"):
                  heading = re.match(r"^#{2,3}\s+(.+)", line)
                  if heading:
                      name = heading.group(1).strip()
                      if re.search(r"phase|bootstrap|core|foundation|setup|deploy|polish", name, re.I) or re.match(r"Phase\s", name, re.I):
                          current = {"name": name, "tasks": []}
                          phases.append(current)
                      continue
                  task = re.match(r"^- \[([ xX])\]\s+(.+)", line)
                  if task and current is not None:
                      done = task.group(1).lower() == "x"
                      text = task.group(2).strip()
                      id_match = re.search(r"`?(T-[\d.]+)`?", text)
                      tid = id_match.group(1) if id_match else f"task-{len(current['tasks'])+1}"
                      title = re.sub(r"`?T-[\d.]+`?[:\s]*", "", text).strip() if id_match else text
                      current["tasks"].append({"id": tid, "title": title or text, "done": done})
              if not phases:
                  fallback = {"name": "Tasks", "tasks": []}
                  for line in content.split("\n"):
                      task = re.match(r"^- \[([ xX])\]\s+(.+)", line)
                      if task:
                          done = task.group(1).lower() == "x"
                          text = task.group(2).strip()
                          id_match = re.search(r"`?(T-[\d.]+)`?", text)
                          tid = id_match.group(1) if id_match else f"task-{len(fallback['tasks'])+1}"
                          title = re.sub(r"`?T-[\d.]+`?[:\s]*", "", text).strip() if id_match else text
                          fallback["tasks"].append({"id": tid, "title": title or text, "done": done})
                  if fallback["tasks"]:
                      phases.append(fallback)
              return phases

          def find_current_task(phases):
              for p in phases:
                  for t in p["tasks"]:
                      if not t["done"]:
                          return {"id": t["id"], "title": t["title"]}
              return None

          def parse_blockers(content):
              blockers = []
              for section in content.split("**Watch out**")[1:]:
                  for line in section.split("\n"):
                      line = line.strip()
                      if not line or line.startswith("##") or line.startswith("**"):
                          break
                      if line.startswith(("-", "*")):
                          blockers.append(line.lstrip("-* ").strip())
              return blockers

          def parse_devlog_latest(content):
              entries = [e for e in content.split("## ") if e.strip()]
              return ("## " + entries[-1].strip()) if entries else None

          def build_session_notes(commit_msg, devlog_latest):
              parts = []
              if commit_msg:
                  parts.append(commit_msg)
              if devlog_latest:
                  lines = devlog_latest.split("\n")[1:]
                  summary = "\n".join(l.strip() for l in lines if l.strip().startswith("-"))[:5]
                  if summary:
                      parts.append(summary)
              return "\n\n".join(parts) if parts else None

          # Parse all files
          plan = read_file("plan.md")
          memory = read_file("memory.md")
          devlog = read_file("devlog.md")

          plan_phases = parse_plan_phases(plan) if plan else []
          plan_completed = len(re.findall(r"- \[x\]", plan, re.I)) if plan else 0
          plan_unchecked = len(re.findall(r"- \[ \]", plan)) if plan else 0
          plan_total = plan_completed + plan_unchecked
          current_task = find_current_task(plan_phases)
          devlog_latest = parse_devlog_latest(devlog) if devlog else None

          payload = {
              "channelId": "github-action",
              "repoUrl": repo_url,
              "branch": branch,
              "latestCommit": {"hash": commit_hash, "message": commit_msg, "date": commit_date},
              "planProgress": {"completed": plan_completed, "total": plan_total} if plan_total > 0 else None,
              "planPhases": plan_phases,
              "currentTask": current_task,
              "defaults": parse_kv_section(memory, "Defaults") if memory else None,
              "testConfig": parse_kv_section(memory, "Tests") if memory else None,
              "sessionNotes": build_session_notes(commit_msg, devlog_latest),
              "blockers": parse_blockers(devlog) if devlog else [],
              "devlogLatest": devlog_latest,
              "testResults": None,
              "syncedAt": synced_at,
          }

          api_url = os.environ["DASHBOARD_API_URL"]
          api_key = os.environ.get("DASHBOARD_API_KEY", "")
          headers = {"Content-Type": "application/json"}
          if api_key:
              headers["Authorization"] = f"Bearer {api_key}"

          # Full sync
          data = json.dumps(payload).encode()
          req = urllib.request.Request(f"{api_url}/api/sync", data=data, headers=headers, method="POST")
          try:
              with urllib.request.urlopen(req) as resp:
                  print(f"Sync: {resp.status} {resp.read().decode()}")
          except urllib.error.HTTPError as e:
              print(f"::warning::Sync failed: {e.code} {e.read().decode()}")

          # Heartbeat
          heartbeat = {
              "channelId": "github-action",
              "repoUrl": repo_url,
              "branch": branch,
              "status": "active",
              "currentTask": current_task["title"] if current_task else None,
              "costUsd": 0,
              "timestamp": synced_at,
          }
          hb_data = json.dumps(heartbeat).encode()
          hb_req = urllib.request.Request(f"{api_url}/api/sync/heartbeat", data=hb_data, headers=headers, method="POST")
          try:
              with urllib.request.urlopen(hb_req) as resp:
                  print(f"Heartbeat: {resp.status}")
          except Exception as e:
              print(f"Heartbeat failed: {e}")

          print("Sync complete.")
          PYEOF
